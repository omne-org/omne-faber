name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify dist/ layout
        run: |
          test -d dist || { echo "ERROR: dist/ missing"; exit 1; }
          test -f dist/AGENTS.md || { echo "ERROR: dist/AGENTS.md missing"; exit 1; }
          test -d dist/cmds || { echo "ERROR: dist/cmds/ missing"; exit 1; }
          test -d dist/pipes || { echo "ERROR: dist/pipes/ missing"; exit 1; }
          test -d dist/hooks || { echo "ERROR: dist/hooks/ missing"; exit 1; }

      - name: Package release artifact
        run: tar -czf omne-faber-v${{ steps.version.outputs.VERSION }}.tar.gz dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: omne-faber-v${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
